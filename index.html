<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Road Trip Marc & Thi Hoa - Mai 2026</title>
    
    <!-- Tailwind CSS pour le style -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet CSS & JS pour la carte OpenStreetMap -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- QRCode.js pour la génération du QR Code -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Styles personnalisés pour compléter Tailwind */
        #map {
            height: 100%;
            min-height: 300px;
            border-radius: 0.75rem;
            z-index: 10;
        }
        
        .custom-div-icon {
            background: transparent;
            border: none;
        }
        
        .marker-pin {
            width: 30px;
            height: 30px;
            border-radius: 50% 50% 50% 0;
            background: #e11d48; /* Rose/Rouge romantique */
            position: absolute;
            transform: rotate(-45deg);
            left: 50%;
            top: 50%;
            margin: -15px 0 0 -15px;
            box-shadow: 0 3px 5px rgba(0,0,0,0.3);
        }
        
        .marker-pin::after {
            content: '';
            width: 14px;
            height: 14px;
            margin: 8px 0 0 8px;
            background: #fff;
            position: absolute;
            border-radius: 50%;
        }

        .step-card {
            transition: all 0.3s ease;
        }
        .step-card.inactive {
            opacity: 0.5;
            filter: grayscale(100%);
        }

        /* Scrollbar élégante pour la liste des étapes */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen flex flex-col overflow-hidden font-sans">

    <!-- En-tête -->
    <header class="bg-rose-600 text-white shadow-md p-4 flex justify-between items-center shrink-0">
        <div>
            <h1 class="text-xl md:text-2xl font-bold flex items-center gap-2">
                <i data-lucide="heart" class="fill-current text-rose-300"></i>
                Road Trip Marc & Thi Hoa - Mai 2026
            </h1>
            <p class="text-rose-100 text-sm md:text-base">Notre escapade en amoureux de 2 jours</p>
        </div>
        <button onclick="openShareModal()" class="bg-white text-rose-600 px-3 py-2 md:px-4 md:py-2 rounded-lg font-medium shadow hover:bg-rose-50 transition flex items-center gap-2">
            <i data-lucide="smartphone" class="w-5 h-5"></i>
            <span class="hidden md:inline">Envoyer sur mon Pixel 10</span>
        </button>
    </header>

    <!-- Conteneur Principal -->
    <main class="flex-1 flex flex-col lg:flex-row overflow-hidden p-2 md:p-4 gap-4">
        
        <!-- Liste des Étapes (Gauche sur Desktop, Bas sur Mobile) -->
        <div class="w-full lg:w-1/2 flex flex-col bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-4 bg-slate-100 border-b border-slate-200 flex justify-between items-center shrink-0">
                <h2 class="text-lg font-semibold flex items-center gap-2 text-slate-700">
                    <i data-lucide="map" class="w-5 h-5"></i> Itinéraire & Étapes
                </h2>
                <span class="text-xs bg-rose-100 text-rose-700 px-2 py-1 rounded-full font-medium" id="stats-badge">
                    Calcul en cours...
                </span>
            </div>
            
            <!-- Liste défilante -->
            <div class="p-4 overflow-y-auto custom-scrollbar flex-1 space-y-4" id="steps-container">
                <!-- Les étapes seront injectées ici par JavaScript -->
            </div>
        </div>

        <!-- Carte (Droite sur Desktop, Haut sur Mobile) -->
        <div class="w-full lg:w-1/2 h-64 lg:h-auto rounded-xl shadow-sm border border-slate-200 overflow-hidden relative">
            <div id="map"></div>
            <!-- Overlay de chargement du trajet -->
            <div id="map-loading" class="absolute inset-0 bg-white/80 backdrop-blur-sm z-[1000] flex flex-col justify-center items-center hidden">
                <i data-lucide="loader-2" class="w-8 h-8 text-rose-600 animate-spin mb-2"></i>
                <p class="text-sm font-medium text-slate-600">Calcul de la route réelle...</p>
            </div>
        </div>

    </main>

    <!-- Fenêtre Modale de Partage (QR Code) -->
    <div id="share-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[2000] hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-2xl shadow-xl max-w-md w-full p-6 transform scale-95 transition-transform duration-300" id="share-modal-content">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-slate-800">Reprendre sur smartphone</h3>
                <button onclick="closeShareModal()" class="text-slate-400 hover:text-slate-600">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <p class="text-slate-600 mb-6 text-sm">Scannez ce QR code avec l'appareil photo de votre Google Pixel 10 pour retrouver l'itinéraire exact avec vos modifications.</p>
            
            <div class="flex justify-center bg-slate-50 p-4 rounded-xl border border-slate-100 mb-6">
                <div id="qrcode"></div>
            </div>
            
            <div class="flex justify-center">
                <button onclick="copyLink()" class="flex items-center gap-2 text-rose-600 font-medium hover:text-rose-700 transition">
                    <i data-lucide="copy" class="w-4 h-4"></i>
                    <span id="copy-text">Copier le lien</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Script JavaScript Principal -->
    <script>
        // Initialisation des icônes Lucide
        lucide.createIcons();

        // Données de l'itinéraire optimisé (2 Jours / 1 Nuit)
        // Les coordonnées sont approximatives mais suffisantes pour le rendu visuel et le GPS
        const allSteps = [
            {
                id: 'conflans',
                title: 'Départ : Conflans-Sainte-Honorine',
                day: 1,
                lat: 48.9984,
                lng: 2.0963,
                desc: 'Départ tranquille avec la 308 Break. La voiture idéale et économique pour ce petit périple.',
                photoTip: 'Avant de partir, une petite photo sur les quais de Seine avec les péniches au confluent de l\'Oise. La lumière du matin y est souvent belle.',
                mandatory: true // Le départ ne peut pas être décoché
            },
            {
                id: 'chantilly',
                title: 'Château de Chantilly',
                day: 1,
                lat: 49.1939,
                lng: 2.4853,
                desc: 'Environ 45 min de route. Un des plus majestueux châteaux de France. Promenez-vous dans les jardins de Le Nôtre sans forcément faire la visite complète si vous voulez préserver votre énergie.',
                photoTip: 'Placez-vous face aux grands plans d\'eau pour avoir le reflet parfait du château dans l\'eau avec Thi Hoa au premier plan.',
                icon: 'castle'
            },
            {
                id: 'pierrefonds',
                title: 'Château de Pierrefonds',
                day: 1,
                lat: 49.3472,
                lng: 2.9792,
                desc: 'Un crochet magique vers un château tout droit sorti d\'un conte de fées, réinventé par Viollet-le-Duc.',
                photoTip: 'Le meilleur spot photo se trouve depuis la rive du petit lac en contrebas, avec les tours gigantesques qui s\'élèvent en arrière-plan.',
                icon: 'castle'
            },
            {
                id: 'amiens_nuit',
                title: 'Nuitée & Dîner : Amiens',
                day: 1,
                lat: 49.8941,
                lng: 2.2957,
                desc: 'Arrivée en fin de journée. Capitale de la Picardie, idéale pour se reposer.',
                hotelTip: "Hôtels sûrs et bien placés :<br>1. <b>Hôtel Le Prieuré</b> : Au pied de la cathédrale, très calme, charme ancien.<br>2. <b>Ibis Styles Amiens Centre</b> : Valeur sûre, très proche de la zone piétonne.<br><br><i>Note Sécurité : Restez dans l'hypercentre (Cathédrale / St-Leu). Évitez le secteur de la gare tard le soir et les quartiers Nord.</i>",
                photoTip: 'Le soir, baladez-vous dans le quartier Saint-Leu (la petite Venise du Nord) au bord des canaux, et devant la Cathédrale illuminée.',
                icon: 'moon',
                mandatory: true
            },
            {
                id: 'arras',
                title: 'Les Places d\'Arras',
                day: 2,
                lat: 50.2910,
                lng: 2.7772,
                desc: 'Départ d\'Amiens après un bon petit-déjeuner. Direction Arras pour admirer l\'architecture flamande et ses 155 maisons en briques parfaitement alignées.',
                photoTip: 'Installez-vous sur la Grand\'Place pour une photo grand angle montrant l\'alignement unique des façades baroques.',
                icon: 'camera'
            },
            {
                id: 'lille',
                title: 'Le Vieux-Lille',
                day: 2,
                lat: 50.6292,
                lng: 3.0573,
                desc: 'Dernière étape dans la capitale des Flandres. Flânerie dans les ruelles pavées du Vieux-Lille. Ne repartez pas sans goûter une gaufre Méert !',
                photoTip: 'Les petites rues pavées autour de la Treille ou sur la Place du Général de Gaulle (Grand Place) offrent des décors briques rouges parfaits.',
                icon: 'coffee'
            },
            {
                id: 'retour',
                title: 'Retour : Conflans-Sainte-Honorine',
                day: 2,
                lat: 48.9984,
                lng: 2.0963,
                desc: 'Retour direct via l\'autoroute A1. Environ 2h30 de route avec la 308 Break. Reposez-vous bien !',
                mandatory: true,
                icon: 'home'
            }
        ];

        // État de l'application
        let activeStepIds = [];
        let map = null;
        let markers = [];
        let routingPolyline = null;
        let straightPolyline = null;

        // Initialisation
        function init() {
            // Lecture des paramètres de l'URL pour la persistance d'état
            const urlParams = new URLSearchParams(window.location.search);
            const savedSteps = urlParams.get('steps');

            if (savedSteps) {
                activeStepIds = savedSteps.split(',');
                // Toujours forcer les étapes obligatoires au cas où l'URL a été bidouillée
                allSteps.filter(s => s.mandatory).forEach(s => {
                    if (!activeStepIds.includes(s.id)) activeStepIds.push(s.id);
                });
            } else {
                // Par défaut, tout est activé
                activeStepIds = allSteps.map(s => s.id);
            }

            initMap();
            renderItinerary();
            updateMapAndRoute();
        }

        // Initialisation de la carte Leaflet
        function initMap() {
            map = L.map('map').setView([49.5, 2.5], 8); // Centre par défaut (Picardie)
            
            // Fond de carte OpenStreetMap
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(map);
        }

        // Rendu de la liste des étapes HTML
        function renderItinerary() {
            const container = document.getElementById('steps-container');
            container.innerHTML = '';

            let currentDay = 0;

            allSteps.forEach((step, index) => {
                // Séparateur de jour
                if (step.day !== currentDay) {
                    currentDay = step.day;
                    const dayHeader = document.createElement('div');
                    dayHeader.className = 'font-bold text-rose-700 bg-rose-50 px-3 py-1.5 rounded-lg text-sm mt-4 mb-2 first:mt-0';
                    dayHeader.innerHTML = `<i data-lucide="calendar" class="w-4 h-4 inline-block mr-1 mb-0.5"></i> Jour ${currentDay}`;
                    container.appendChild(dayHeader);
                }

                const isActive = activeStepIds.includes(step.id);
                
                const card = document.createElement('div');
                card.className = `step-card bg-white border ${isActive ? 'border-rose-200 shadow-sm' : 'border-slate-200 inactive'} rounded-xl p-4`;
                
                // En-tête de la carte (Titre + Switch)
                const header = document.createElement('div');
                header.className = 'flex justify-between items-start mb-2';
                
                const titleWrapper = document.createElement('div');
                titleWrapper.className = 'flex items-center gap-2 pr-4';
                
                // Icône dynamique
                let iconName = step.icon || 'map-pin';
                if (step.id === 'conflans') iconName = 'car';
                
                titleWrapper.innerHTML = `
                    <div class="${isActive ? 'bg-rose-100 text-rose-600' : 'bg-slate-100 text-slate-400'} p-2 rounded-lg shrink-0">
                        <i data-lucide="${iconName}" class="w-5 h-5"></i>
                    </div>
                    <h3 class="font-semibold text-slate-800 ${!isActive ? 'line-through' : ''}">${step.title}</h3>
                `;

                const toggleBtn = document.createElement('button');
                if (!step.mandatory) {
                    toggleBtn.className = `relative inline-flex h-6 w-11 items-center rounded-full transition-colors focus:outline-none ${isActive ? 'bg-rose-500' : 'bg-slate-300'}`;
                    toggleBtn.innerHTML = `<span class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform ${isActive ? 'translate-x-6' : 'translate-x-1'}"></span>`;
                    toggleBtn.onclick = () => toggleStep(step.id);
                } else {
                    toggleBtn.innerHTML = `<span class="text-xs text-slate-400 italic">Incontournable</span>`;
                }

                header.appendChild(titleWrapper);
                header.appendChild(toggleBtn);
                card.appendChild(header);

                // Description
                const desc = document.createElement('p');
                desc.className = 'text-sm text-slate-600 mb-3 ml-11';
                desc.innerHTML = step.desc;
                card.appendChild(desc);

                // Recommandation Hôtel (spécifique Amiens)
                if (step.hotelTip && isActive) {
                    const hotelBox = document.createElement('div');
                    hotelBox.className = 'ml-11 mb-3 bg-amber-50 border border-amber-200 text-amber-800 p-3 rounded-lg text-sm';
                    hotelBox.innerHTML = `
                        <div class="font-semibold flex items-center gap-1 mb-1"><i data-lucide="bed" class="w-4 h-4"></i> Recommandation Logement</div>
                        ${step.hotelTip}
                    `;
                    card.appendChild(hotelBox);
                }

                // Conseil Photo
                if (step.photoTip && isActive) {
                    const photoBox = document.createElement('div');
                    photoBox.className = 'ml-11 bg-rose-50/50 border border-rose-100 p-3 rounded-lg text-sm text-slate-700';
                    photoBox.innerHTML = `
                        <div class="font-semibold text-rose-600 flex items-center gap-1 mb-1"><i data-lucide="camera" class="w-4 h-4"></i> Conseil Photo</div>
                        ${step.photoTip}
                    `;
                    card.appendChild(photoBox);
                }

                container.appendChild(card);
            });

            // Re-render lucide icons inside dynamically created HTML
            lucide.createIcons();
        }

        // Basculer l'état d'une étape
        function toggleStep(id) {
            const index = activeStepIds.indexOf(id);
            if (index > -1) {
                activeStepIds.splice(index, 1); // Remove
            } else {
                // Insert at the right order based on allSteps
                activeStepIds.push(id);
                activeStepIds.sort((a, b) => {
                    return allSteps.findIndex(s => s.id === a) - allSteps.findIndex(s => s.id === b);
                });
            }
            
            // Mise à jour de l'URL sans recharger la page
            const newUrl = new URL(window.location);
            newUrl.searchParams.set('steps', activeStepIds.join(','));
            window.history.replaceState({}, '', newUrl);

            renderItinerary();
            updateMapAndRoute();
        }

        // Mise à jour de la carte (Marqueurs et itinéraire routier OSRM)
        async function updateMapAndRoute() {
            // Nettoyage de la carte
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            if (routingPolyline) map.removeLayer(routingPolyline);
            if (straightPolyline) map.removeLayer(straightPolyline);

            const activeCoords = [];
            
            // Ajout des marqueurs
            allSteps.forEach((step, index) => {
                if (activeStepIds.includes(step.id)) {
                    activeCoords.push([step.lng, step.lat]); // OSRM prend lng, lat

                    // Custom HTML Icon
                    const customIcon = L.divIcon({
                        className: 'custom-div-icon',
                        html: `<div class="marker-pin"></div><div style="position: absolute; top: -18px; left: -10px; width: 20px; text-align: center; font-weight: bold; font-size: 12px; z-index: 100;">${activeCoords.length}</div>`,
                        iconSize: [30, 42],
                        iconAnchor: [15, 42]
                    });

                    const marker = L.marker([step.lat, step.lng], { icon: customIcon })
                        .bindPopup(`<b>${step.title}</b>`)
                        .addTo(map);
                    markers.push(marker);
                }
            });

            if (activeCoords.length < 2) return;

            // Centrer la carte pour voir tous les points
            const bounds = L.latLngBounds(activeCoords.map(c => [c[1], c[0]]));
            map.fitBounds(bounds, { padding: [50, 50] });

            // Mise à jour de l'interface
            document.getElementById('stats-badge').innerText = `${activeCoords.length} étapes sélectionnées`;
            document.getElementById('map-loading').classList.remove('hidden');

            // Appel à l'API publique OSRM pour calculer le vrai tracé de la route
            try {
                const coordString = activeCoords.map(c => `${c[0]},${c[1]}`).join(';');
                const response = await fetch(`https://router.project-osrm.org/route/v1/driving/${coordString}?overview=full&geometries=geojson`);
                
                if (response.ok) {
                    const data = await response.json();
                    const routeCoordinates = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]); // Inverser en lat, lng pour Leaflet
                    
                    routingPolyline = L.polyline(routeCoordinates, {
                        color: '#e11d48', // Rose Tailwind
                        weight: 4,
                        opacity: 0.8,
                        dashArray: '10, 10',
                        lineJoin: 'round'
                    }).addTo(map);
                    
                    // Calcul approximatif temps/distance
                    const distanceKm = Math.round(data.routes[0].distance / 1000);
                    const durationH = Math.round(data.routes[0].duration / 3600);
                    document.getElementById('stats-badge').innerText = `~${distanceKm} km total`;

                } else {
                    throw new Error('OSRM API Error');
                }
            } catch (error) {
                console.warn("Impossible de récupérer la route via OSRM, utilisation d'une ligne droite.", error);
                // Fallback : Ligne droite si l'API publique est surchargée
                straightPolyline = L.polyline(activeCoords.map(c => [c[1], c[0]]), {
                    color: '#94a3b8',
                    weight: 3,
                    dashArray: '5, 10'
                }).addTo(map);
            } finally {
                document.getElementById('map-loading').classList.add('hidden');
            }
        }

        // --- Fonctions pour la Modale de Partage ---
        let qrCodeInstance = null;

        function openShareModal() {
            const modal = document.getElementById('share-modal');
            const content = document.getElementById('share-modal-content');
            
            modal.classList.remove('hidden');
            // Small delay to allow display:block to apply before animating opacity
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
            }, 10);

            // Génération du QR Code basé sur l'URL courante (qui contient les étapes actives)
            const currentUrl = window.location.href;
            
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = ''; // Clear previous
            
            qrCodeInstance = new QRCode(qrContainer, {
                text: currentUrl,
                width: 200,
                height: 200,
                colorDark : "#0f172a", // slate-900
                colorLight : "#f8fafc", // slate-50
                correctLevel : QRCode.CorrectLevel.L
            });
            
            document.getElementById('copy-text').innerText = "Copier le lien";
        }

        function closeShareModal() {
            const modal = document.getElementById('share-modal');
            const content = document.getElementById('share-modal-content');
            
            modal.classList.add('opacity-0');
            content.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300); // durée de la transition CSS
        }

        function copyLink() {
            navigator.clipboard.writeText(window.location.href).then(() => {
                const copyText = document.getElementById('copy-text');
                copyText.innerText = "Copié !";
                setTimeout(() => {
                    copyText.innerText = "Copier le lien";
                }, 2000);
            }).catch(err => {
                // Fallback pour les iframes anciennes
                const input = document.createElement('input');
                input.value = window.location.href;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                document.getElementById('copy-text').innerText = "Copié !";
            });
        }

        // Lancement au chargement
        window.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
